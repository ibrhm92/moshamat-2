<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مساهمات - نظام إدارة المدفوعات الجماعية</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #1a6b4a;
      --primary-light: #2ecc71;
      --accent: #f0b429;
      --bg: #0a1628;
      --text: #e8f4f0;
      --text-muted: #8aa8b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(26, 107, 74, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(240, 180, 41, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(15, 32, 64, 0.8) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      text-align: center;
      z-index: 1;
      position: relative;
    }

    .logo-icon {
      font-size: 80px;
      margin-bottom: 24px;
      display: block;
      filter: drop-shadow(0 0 30px rgba(46, 204, 113, 0.4));
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 900;
      background: linear-gradient(135deg, #2ecc71, #f0b429);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 18px;
      margin-bottom: 40px;
      font-family: 'Tajawal', sans-serif;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 32px;
      border-radius: 16px;
      border: none;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(46, 204, 113, 0.6);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .loading {
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .footer {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-muted);
      font-size: 14px;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="container loading">
    <span class="logo-icon">💰</span>
    <h1>مساهمات</h1>
    <p class="subtitle">نظام إدارة وتتبع المدفوعات الجماعية</p>
    
    <a href="pages/home.html" class="btn">
      🏠 الدخول إلى النظام
    </a>
  </div>

  <div class="footer">
    🔒 البيانات محفوظة على Firebase Firestore
  </div>

  <script>
    // Auto-redirect after 3 seconds
    setTimeout(() => {
      window.location.href = 'pages/home.html';
    }, 3000);
  </script>
</body>

</html>
